<!DOCTYPE html>
<html>
<head>
  <title>Time</title>

  <style>
    body {
      background: #000;
      color: #fff;
      font-family: Arial, Helvetica, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      overflow: hidden;
    }

    #text {
      font-size: 42px;
      text-align: center;
      max-width: 900px;
      line-height: 1.4;
      letter-spacing: 1px;
    }

    .word {
      display: inline-block;
      opacity: 0;
      transform: translateY(20px) scale(0.95);
      margin: 0 8px;
      font-weight: 700;
      font-size: 58px;
      animation: slam 0.35s ease forwards;
    }

    @keyframes slam {
      0% {
        opacity: 0;
        transform: translateY(40px) scale(0.8);
      }
      60% {
        opacity: 1;
        transform: translateY(-5px) scale(1.05);
      }
      100% {
        transform: translateY(0) scale(1);
      }
    }
  </style>
</head>

<body>

<div id="text"></div>

<script>
const sentences = [
  "du nochmal getragen werden willst.",
  "du gelernte Wörter falsch aussprichst.",
  "du getragen werden willst.",
  "du eine Gutenachtgeschichte vorgelesen bekommst.",
  "du gefüttert wirst."
];

const statement = [
  "man", "vergisst", "viel", "zu", "leicht,",
  "wie", "schnell", "die", "zeit", "vergeht.",
  "also",
  "mach",
  "das",
  "beste",
  "draus."
];

let i = 0;
let j = 0;
let isDeleting = false;
let mode = "typing";

function typeLoop() {
  if (mode !== "typing") return;

  const fullText = sentences[i];

  if (isDeleting) {
    j--;
  } else {
    j++;
  }

  if (j < 0) j = 0;
  if (j > fullText.length) j = fullText.length;

  document.getElementById("text").innerText = fullText.substring(0, j);

  let speed = isDeleting ? 35 : 65;

  if (!isDeleting && j === fullText.length) {
    speed = 1200;
    isDeleting = true;
  }

  if (isDeleting && j === 0) {
    isDeleting = false;
    i++;

    if (i >= sentences.length) {
      mode = "pause";
      setTimeout(startStatement, 1000);
      return;
    }
  }

  setTimeout(typeLoop, speed);
}

function startStatement() {
  mode = "statement";
  const container = document.getElementById("text");
  container.innerHTML = "";

  statement.forEach((word, index) => {
    setTimeout(() => {
      const span = document.createElement("span");
      span.className = "word";
      span.innerText = word;
      container.appendChild(span);
    }, index * 280);
  });

  // Pause nach Statement → dann reset
  setTimeout(() => {
    container.innerHTML = "";
    i = 0;
    j = 0;
    isDeleting = false;
    mode = "typing";
    typeLoop();
  }, statement.length * 280 + 2500);
}

// Start
typeLoop();
</script>

</body>
</html>
