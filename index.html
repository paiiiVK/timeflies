<!DOCTYPE html>
<html>
<head>
  <title>Time</title>

  <style>
    body {
      background: #000;
      color: #fff;
      font-family: Arial, Helvetica, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    #text {
      text-align: center;
      max-width: 900px;
      line-height: 1.5;
    }

    .typing {
      font-size: 38px;
    }

    .statement {
      font-size: 54px;
      font-weight: 700;
    }

    .line {
      opacity: 0;
      transition: opacity 1s ease;
      margin: 10px 0;
    }

    .show {
      opacity: 1;
    }
  </style>
</head>

<body>

<div id="text" class="typing"></div>

<script>
const sentences = [
  "du nochmal getragen werden willst.",
  "du gelernte Wörter falsch aussprichst.",
  "du getragen werden willst.",
  "du eine Gutenachtgeschichte vorgelesen bekommst.",
  "du gefüttert wirst."
];

const statement = [
  "man vergisst viel zu leicht,",
  "wie schnell die zeit vergeht.",
  "also mach das beste draus."
];

let i = 0;
let j = 0;
let isDeleting = false;
let mode = "typing";

function typeLoop() {
  if (mode !== "typing") return;

  const fullText = sentences[i];

  if (isDeleting) {
    j--;
  } else {
    j++;
  }

  if (j < 0) j = 0;
  if (j > fullText.length) j = fullText.length;

  document.getElementById("text").innerText = fullText.substring(0, j);

  // ⚡ DEUTLICH SCHNELLER
  let speed = isDeleting ? 20 : 35;

  if (!isDeleting && j === fullText.length) {
    isDeleting = true;
    return setTimeout(typeLoop, 500);
  }

  if (isDeleting && j === 0) {
    isDeleting = false;
    i++;

    if (i >= sentences.length) {
      mode = "statement";
      return setTimeout(showStatement, 600);
    }
  }

  setTimeout(typeLoop, speed);
}

function showStatement() {
  const container = document.getElementById("text");
  container.className = "statement";
  container.innerHTML = "";

  statement.forEach((line, index) => {
    const div = document.createElement("div");
    div.className = "line";
    div.innerText = line;
    container.appendChild(div);

    // 🧠 LANGSAM + SAUBER
    setTimeout(() => {
      div.classList.add("show");
    }, index * 1200);
  });

  // Pause danach
  setTimeout(() => {
    container.className = "typing";
    container.innerHTML = "";
    i = 0;
    j = 0;
    isDeleting = false;
    mode = "typing";
    typeLoop();
  }, statement.length * 1200 + 3000);
}

// Start
typeLoop();
</script>

</body>
</html>
