<!DOCTYPE html>
<html>
<head>
  <title>Time</title>
  <style>
    body {
      background: black;
      color: white;
      font-family: monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    #text {
      font-size: 40px;
      text-align: center;
      max-width: 800px;
    }
  </style>
</head>
<body>

<div id="text"></div>

<script>
const sentences = [
  "du nochmal getragen werden willst.",
  "du gelernte Wörter falsch aussprichst.",
  "du getragen werden willst.",
  "du eine Gutenachtgeschichte vorgelesen bekommst.",
  "du gefüttert wirst."
];

let i = 0;
let j = 0;
let currentText = "";
let isDeleting = false;

function type() {
  let fullText = sentences[i];

  if (isDeleting) {
    currentText = fullText.substring(0, j--);
  } else {
    currentText = fullText.substring(0, j++);
  }

  document.getElementById("text").innerText = currentText;

  let speed = isDeleting ? 40 : 80;

  if (!isDeleting && j === fullText.length) {
    setTimeout(() => isDeleting = true, 1000);
  } else if (isDeleting && j === 0) {
    isDeleting = false;
    i = (i + 1) % sentences.length;
  }

  setTimeout(type, speed);
}

type();
</script>

</body>
</html>
