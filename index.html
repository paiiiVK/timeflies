<!DOCTYPE html>
<html>
<head>
  <title>Time</title>

  <!-- ⌨️ Schreibmaschinen Font -->
  <link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">

  <style>
    body {
      background: #ffffff;
      color: #2e8b57; /* 💚 schönes Grün */
      font-family: 'Special Elite', monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    #text {
      font-size: 34px;
      text-align: center;
      max-width: 700px;
      line-height: 1.7;
      letter-spacing: 1px;
    }

    .statement {
      font-size: 56px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      letter-spacing: 2px;
    }

    .word {
      margin: 6px 10px;
      opacity: 0;
      transform: translateY(-80px);
      animation: drop 0.5s ease forwards;
    }

    @keyframes drop {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>

<div id="text"></div>

<script>
const sentences = [
  "du das letze Mal getragen werden wolltest.",
  "du gelernte Wörter falsch ausgesprochen hast, obwohl sie dir richtig erschienen.",
  "du deine letzte Gutenachtgeschichte vorgelesen bekommen hast.",
  "du gefüttert werden musstest, weil sonst alles daneben geht."
];

const statementWords = [
  "wieso", "kann", "man", "sich", "so", "schwer", "daran", "erinnern,",
  "wie", "die", "eigenen", "ersten", "jahre", "waren,",
  "obwohl", "du", "sie", "selbst", "erlebt", "hast?"
];

let i = 0;
let j = 0;
let isDeleting = false;
let mode = "typing";

function typeLoop() {
  if (mode !== "typing") return;

  const fullText = sentences[i];

  if (isDeleting) {
    j--;
  } else {
    j++;
  }

  if (j < 0) j = 0;
  if (j > fullText.length) j = fullText.length;

  document.getElementById("text").innerText = fullText.substring(0, j);

  // ⚡ schneller Anfang
  let speed = isDeleting ? 15 : 30;

  if (!isDeleting && j === fullText.length) {
    isDeleting = true;
    return setTimeout(typeLoop, 300);
  }

  if (isDeleting && j === 0) {
    isDeleting = false;
    i++;

    if (i >= sentences.length) {
      mode = "statement";
      return setTimeout(showStatement, 300);
    }
  }

  setTimeout(typeLoop, speed);
}

function showStatement() {
  const container = document.getElementById("text");
  container.innerHTML = "";
  container.className = "statement";

  statementWords.forEach((word, index) => {
    setTimeout(() => {
      const span = document.createElement("span");
      span.className = "word";
      span.innerText = word;
      container.appendChild(span);
    }, index * 400);
  });

  // ⏸️ genug Zeit zum Lesen
  setTimeout(() => {
    hardReset();
  }, statementWords.length * 400 + 4000);
}

function hardReset() {
  const container = document.getElementById("text");

  container.innerHTML = "";
  container.className = "";

  i = 0;
  j = 0;
  isDeleting = false;
  mode = "typing";

  setTimeout(typeLoop, 300);
}

// Start
typeLoop();
</script>

</body>
</html>
