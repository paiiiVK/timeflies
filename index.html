<!DOCTYPE html>
<html>
<head>
  <title>Time</title>

  <style>
    body {
      background: black;
      color: white;
      font-family: monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    #text {
      font-size: 42px;
      text-align: center;
      max-width: 800px;
      line-height: 1.4;
    }
  </style>
</head>

<body>

<div id="text"></div>

<script>
const sentences = [
  "du nochmal getragen werden willst.",
  "du gelernte Wörter falsch aussprichst.",
  "du getragen werden willst.",
  "du eine Gutenachtgeschichte vorgelesen bekommst.",
  "du gefüttert wirst."
];

let i = 0;
let j = 0;
let isDeleting = false;

function type() {
  const fullText = sentences[i];

  // Buchstaben hinzufügen oder entfernen
  if (isDeleting) {
    j--;
  } else {
    j++;
  }

  // Grenzen fixen (wichtig!)
  if (j < 0) j = 0;
  if (j > fullText.length) j = fullText.length;

  const currentText = fullText.substring(0, j);

  document.getElementById("text").innerText = currentText;

  let speed = isDeleting ? 40 : 70;

  // Pause am Ende
  if (!isDeleting && j === fullText.length) {
    speed = 1200;
    isDeleting = true;
  }

  // Wechsel zum nächsten Satz
  if (isDeleting && j === 0) {
    isDeleting = false;
    i = (i + 1) % sentences.length;
    speed = 300;
  }

  setTimeout(type, speed);
}

// Start
type();
</script>

</body>
</html>
