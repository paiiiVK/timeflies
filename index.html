<!DOCTYPE html>
<html>
<head>
  <title>Time</title>

  <style>
    body {
      background: #000;
      color: #fff;
      font-family: Arial, Helvetica, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      overflow: hidden;
    }

    #text {
      font-size: 42px;
      text-align: center;
      max-width: 900px;
      line-height: 1.4;
      letter-spacing: 1px;
      transition: all 0.6s ease;
    }

    .fade-out {
      opacity: 0;
      filter: blur(10px);
      transform: scale(0.95);
    }

    .fade-in {
      opacity: 1;
      filter: blur(0);
      transform: scale(1);
    }

    .statement-line {
      display: block;
      font-size: 60px;
      font-weight: 700;
      margin: 15px 0;
      opacity: 0;
      transform: translateY(20px);
      animation: rise 0.8s ease forwards;
    }

    @keyframes rise {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>

<div id="text" class="fade-in"></div>

<script>
const sentences = [
  "du nochmal getragen werden willst.",
  "du gelernte Wörter falsch aussprichst.",
  "du getragen werden willst.",
  "du eine Gutenachtgeschichte vorgelesen bekommst.",
  "du gefüttert wirst."
];

const statement = [
  "man vergisst viel zu leicht,",
  "wie schnell die zeit vergeht.",
  "also mach das beste draus."
];

let i = 0;
let j = 0;
let isDeleting = false;
let mode = "typing";

function typeLoop() {
  if (mode !== "typing") return;

  const fullText = sentences[i];

  if (isDeleting) {
    j--;
  } else {
    j++;
  }

  if (j < 0) j = 0;
  if (j > fullText.length) j = fullText.length;

  const container = document.getElementById("text");
  container.innerText = fullText.substring(0, j);

  let speed = isDeleting ? 25 : 45;

  if (!isDeleting && j === fullText.length) {
    isDeleting = true;
    return setTimeout(typeLoop, 600);
  }

  if (isDeleting && j === 0) {
    isDeleting = false;
    i++;

    if (i >= sentences.length) {
      mode = "transition";
      return transitionToStatement();
    }
  }

  setTimeout(typeLoop, speed);
}

function transitionToStatement() {
  const container = document.getElementById("text");

  // 🎬 Fade + Blur OUT
  container.classList.remove("fade-in");
  container.classList.add("fade-out");

  setTimeout(() => {
    container.innerHTML = "";
    startStatement();
  }, 600);
}

function startStatement() {
  const container = document.getElementById("text");

  container.classList.remove("fade-out");
  container.classList.add("fade-in");

  statement.forEach((line, index) => {
    setTimeout(() => {
      const div = document.createElement("div");
      div.className = "statement-line";
      div.innerText = line;
      container.appendChild(div);
    }, index * 1000);
  });

  // 🔁 Zurück zum Anfang
  setTimeout(() => {
    container.classList.remove("fade-in");
    container.classList.add("fade-out");

    setTimeout(() => {
      container.innerHTML = "";
      i = 0;
      j = 0;
      isDeleting = false;
      mode = "typing";
      container.classList.remove("fade-out");
      container.classList.add("fade-in");
      typeLoop();
    }, 600);

  }, statement.length * 1000 + 3000);
}

// Start
typeLoop();
</script>

</body>
</html>
